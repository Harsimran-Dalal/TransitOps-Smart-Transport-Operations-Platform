[build]
builder = "NIXPACKS"
buildCommand = "npm install --workspaces --include-workspace-root && npm run build --workspace=@transitops/shared && npm run build --workspace=@transitops/backend"

[deploy]
startCommand = "cd backend && npx prisma db push --accept-data-loss && node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
